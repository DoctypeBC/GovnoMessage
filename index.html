<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    // ТВОЙ КОНФИГ (проверь, что все поля заполнены!)
    const firebaseConfig = {
        apiKey: "AIzaSyA6LQ97ZLXqQSUa_ExUi2l1F_gALo4gYHE",
  authDomain: "govnomessage.firebaseapp.com",
  projectId: "govnomessage",
  storageBucket: "govnomessage.firebasestorage.app",
  messagingSenderId: "249971075712",
  appId: "1:249971075712:web:58cf85d652942b8c6a9465"
    };

    // Инициализация
    try {
        firebase.initializeApp(firebaseConfig);
        document.getElementById('status').textContent = '✅ Firebase инициализирован';
    } catch (e) {
        document.getElementById('status').textContent = '❌ Ошибка инициализации: ' + e.message;
    }

    const db = firebase.firestore();

    // Проверка подключения к Firestore
    db.collection('messages').limit(1).get()
        .then(() => {
            document.getElementById('status').textContent = '✅ Подключение к Firestore успешно';
        })
        .catch((err) => {
            document.getElementById('status').textContent = '❌ Ошибка подключения: ' + err.message;
        });

    // DOM-элементы
    const chatDiv = document.getElementById('chat');
    const nameInput = document.getElementById('nameInput');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');

    // Отправка сообщения
    async function sendMessage() {
        const name = nameInput.value.trim() || 'Аноним';
        const text = msgInput.value.trim();
        if (!text) return;

        statusDiv.textContent = '⏳ Отправка...';
        try {
            const docRef = await db.collection('messages').add({
                name: name,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            statusDiv.textContent = '✅ Отправлено! ID: ' + docRef.id;
            msgInput.value = '';
            msgInput.focus();
            localStorage.setItem('userName', name);
        } catch (e) {
            statusDiv.textContent = '❌ Ошибка: ' + e.message;
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Чтение сообщений в реальном времени
    db.collection('messages')
        .orderBy('timestamp', 'asc')
        .onSnapshot((snapshot) => {
            chatDiv.innerHTML = '';
            if (snapshot.empty) {
                statusDiv.textContent = '📭 Сообщений пока нет';
            } else {
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg ' + (data.name === nameInput.value ? 'me' : 'other');
                    msgDiv.innerHTML = `<span class="name">${data.name || 'Аноним'}</span> ${data.text || ''}`;
                    chatDiv.appendChild(msgDiv);
                });
                chatDiv.scrollTop = chatDiv.scrollHeight;
                statusDiv.textContent = '📨 ' + snapshot.size + ' сообщений';
            }
        }, (error) => {
            statusDiv.textContent = '❌ Ошибка чтения: ' + error.message;
        });

    // Имя из localStorage
    if (localStorage.getItem('userName')) {
        nameInput.value = localStorage.getItem('userName');
    }
    msgInput.focus();
</script>
